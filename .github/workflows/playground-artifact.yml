name: Playground build

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    uses: tidefield/disco-playground/.github/workflows/publish-static-build.yml@main
    with:
      install-command: npm ci
      build-command: npm run build
      output-dir: dist
      branch: build
      node-version: "22"
      commit-message: Publish tidefield-dev build
